# Example CoIR (BEIR-format) dataset configuration.
#
# CoIR datasets have separate corpus, queries, and qrels subsets.
# Adjust config names, field names, and split as needed for your dataset.

datasets:
  - name: "CoIR-Retrieval/codesearchnet"
    languages: ["python", "java", "javascript", "go", "ruby", "php"]
    dataset_type: "coir"
    query_field: ""          # not used for CoIR
    documents_field: ""      # not used for CoIR
    lang_as_config: false
    split: "test"
    # CoIR-specific field mapping
    corpus_config: "corpus"
    queries_config: "queries"
    qrels_config: "default"
    corpus_text_field: "text"
    corpus_id_field: "_id"
    queries_text_field: "text"
    queries_id_field: "_id"
    qrels_query_id_field: "query-id"
    qrels_corpus_id_field: "corpus-id"
    qrels_score_field: "score"

embedding_models:
  - name: "Shuu12121/CodeSearch-ModernBERT-Crow-v3-large-len1024-ColBERT-Shuu12121-120_1epochs"
    architecture: "colbert"

mining_config:
  top_k: 200
  encode_batch_size: 32
  index_batch_size: 50000
  query_batch_size: 50000
  nv_threshold: 0.99
  num_negatives: 100
  index_dir: "./plaid_index"
  cache_dir: "./cache"
  device: ""  # auto-detect (cuda / cpu)
  faiss:
    use_gpu: true

upload_config:
  dataset: "Shuu12121/coir_hard_negative_datasets"
  max_per_language: 10000000000
  max_per_query: 100

datasets:
  - name: "Shuu12121/javascript-treesitter-dedupe-filtered-datasetsV2"
    languages: ["javascript"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/ruby-treesitter-dedupe-filtered-datasetsV2"
    languages: ["ruby"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/go-treesitter-dedupe-filtered-datasetsV2"
    languages: ["go"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/java-treesitter-dedupe-filtered-datasetsV2"
    languages: ["java"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/rust-treesitter-dedupe-filtered-datasetsV2"
    languages: ["rust"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/php-treesitter-dedupe-filtered-datasetsV2"
    languages: ["php"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/python-treesitter-dedupe-filtered-datasetsV2"
    languages: ["python"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "Shuu12121/typescript-treesitter-dedupe-filtered-datasetsV2"
    languages: ["typescript"]
    query_field: "docstring"
    documents_field: "code"
    lang_as_config: false
    dataset_type: "paired"
  - name: "code-search-net/code_search_net"
    languages: ["javascript","ruby","go","java","php","python"]
    query_field: "func_documentation_string"
    documents_field: "func_code_string"
    lang_as_config: true
    dataset_type: "paired"

embedding_models:
  - name: "Qwen/Qwen3-Embedding-0.6B"
    architecture: "sentence-transformers"
    max_seq_length: 1024

mining_config:
  top_k: 200
  encode_batch_size: 32
  index_batch_size: 50000
  query_batch_size: 10000
  search_batch_size: 5000
  nv_threshold: 0.99
  num_negatives: 200
  index_dir: "./plaid_index"
  cache_dir: "./cache"
  device: ""  # auto-detect (cuda / cpu)
  faiss:
    index_type: "hnsw"
    hnsw_m: 32
    ef_search: 128
    use_gpu: false

upload_config:
  dataset: "Shuu12121/owl_code_search_hard_negative_datasets_V2"
  max_per_language: 100000000
  max_per_query: 100

strip_docstrings: true

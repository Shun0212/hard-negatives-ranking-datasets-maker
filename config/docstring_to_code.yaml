embedding_models:
  - name: "Shuu12121/ColModernBERT-Crow-v3-large-len1024-Pre"
    architecture: "sentence-transformers"

mining_config:
  top_k: 32
  encode_batch_size: 32
  index_batch_size: 50000
  query_batch_size: 50000
  search_batch_size: 2500
  nv_threshold: 0.99
  num_negatives: 31
  index_dir: "./plaid_index"
  cache_dir: "./cache"
  device: ""  # auto-detect (cuda / cpu)

upload_config:
  dataset: "Shuu12121/owl_code_search_hard_negative_datasets"
  max_per_language: 100000
  max_per_query: 32

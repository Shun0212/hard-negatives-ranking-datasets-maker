# Hard negative mining configuration for all CoIR benchmark datasets.
#
# CoIR (Code Information Retrieval) includes 10 datasets across 4 task types:
#   - Text-to-Code: CodeSearchNet, CosQA, Apps, StackOverflow-QA, Synthetic-Text2SQL
#   - Code-to-Code: CodeSearchNet-ccr, CodeTrans-Contest, CodeTrans-DL
#   - Hybrid-Code:  CodeFeedback-MT, CodeFeedback-ST
#
# All CoIR datasets use BEIR format (separate corpus/queries/qrels subsets).

datasets:
  # ── Text-to-Code ─────────────────────────────────────────────────────────
  # CodeSearchNet: docstring → code (6 languages, per-language configs)
  - name: "CoIR-Retrieval/CodeSearchNet"
    languages: ["go", "java", "javascript", "php", "python", "ruby"]
    dataset_type: "coir"
    query_field: ""
    documents_field: ""
    lang_as_config: true
    deduplicate_corpus: true
    lang_config_format: "{lang}-{config}"
    corpus_config: "corpus"
    queries_config: "queries"
    qrels_config: "qrels"
    corpus_split: "corpus"
    queries_split: "queries"
    qrels_split: "train"
    split: "train"
    corpus_text_field: "text"
    corpus_id_field: "_id"
    queries_text_field: "text"
    queries_id_field: "_id"
    qrels_query_id_field: "query-id"
    qrels_corpus_id_field: "corpus-id"
    qrels_score_field: "score"

  # CosQA: natural language query → Python code
  - name: "CoIR-Retrieval/cosqa"
    languages: ["python"]
    dataset_type: "coir"
    query_field: ""
    documents_field: ""
    lang_as_config: false
    deduplicate_corpus: true
    split: "train"
    corpus_config: "corpus"
    queries_config: "queries"
    qrels_config: "default"
    corpus_split: "corpus"
    queries_split: "queries"
    qrels_split: "train"
    corpus_text_field: "text"

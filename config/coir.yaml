embedding_models:
  - name: "Qwen/Qwen3-Embedding-0.6B"
    architecture: "sentence-transformers"
    max_seq_length: 1024

mining_config:
  top_k: 200
  encode_batch_size: 32
  index_batch_size: 50000
  query_batch_size: 10000
  search_batch_size: 5000
  nv_threshold: 0.99
  num_negatives: 100
  index_dir: "./plaid_index"
  cache_dir: "./cache"
  device: ""  # auto-detect (cuda / cpu)
  faiss:
    index_type: "hnsw"
    hnsw_m: 32
    ef_search: 128
    use_gpu: false

upload_config:
  dataset: "Shuu12121/coir_hard_negative_datasets_v2"
  max_per_language: 10000000000
  max_per_query: 100

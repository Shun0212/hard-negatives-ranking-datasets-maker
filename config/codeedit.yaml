datasets:
  - name: "Shuu12121/CodeEditDataset"
    languages: ["python","javascript","typescript","go","ruby","java","php","c","c++","rust","swift","scala","bash",]
    query_field: "instruction"
    documents_field: "diff"
    lang_as_config: true
    dataset_type: "paired"

strip_docstrings: false 

embedding_models:
  - name: "Qwen/Qwen3-Embedding-0.6B"
    architecture: "sentence-transformers"
    max_seq_length: 1024

mining_config:
  top_k: 200
  encode_batch_size: 32
  index_batch_size: 50000
  query_batch_size: 10000
  search_batch_size: 5000
  nv_threshold: 0.99
  num_negatives: 200
  index_dir: "./plaid_index"
  cache_dir: "./cache"
  device: ""  # auto-detect (cuda / cpu)
  faiss:
    index_type: "hnsw"
    hnsw_m: 32
    ef_search: 128
    use_gpu: false

upload_config:
  dataset: "Shuu12121/codeedit_hard_negative_datasets"
  max_per_language: 100000000
  max_per_query: 100

